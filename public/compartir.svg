<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <!-- Fonts and styles -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Playfair+Display:ital,wght@1,700&amp;display=swap');
      
      .main-title {
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        font-size: 72px;
        fill: #1E0A3C;
        letter-spacing: 6px;
      }
      .subtitle {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 14px;
        fill: #4B1A7A;
        letter-spacing: 3px;
      }
      .slogan-banner {
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 700;
        font-size: 26px;
        fill: #B5179E;
      }
      .slogan-highlight {
        fill: #FF007F;
        font-weight: 900;
      }
      .card-title {
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-size: 11px;
        fill: #1E0A3C;
        letter-spacing: 0.5px;
      }
      .card-desc {
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 9.5px;
        fill: #624B7F;
      }
      .bottom-guide {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 13px;
        fill: #4B1A7A;
        letter-spacing: 0.5px;
      }
      .bottom-cta {
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 700;
        font-size: 20px;
        fill: #FF007F;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#FFF0F6" />
      <stop offset="70%" stop-color="#F3E8FF" />
      <stop offset="100%" stop-color="#EBE0FF" />
    </linearGradient>

    <linearGradient id="headerRibbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B5179E" />
      <stop offset="100%" stop-color="#7209B7" />
    </linearGradient>

    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF007F" />
      <stop offset="40%" stop-color="#B5179E" />
      <stop offset="80%" stop-color="#7209B7" />
      <stop offset="100%" stop-color="#3F37C9" />
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007F" />
      <stop offset="50%" stop-color="#B5179E" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>

    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B1A7A" />
      <stop offset="35%" stop-color="#B5179E" />
      <stop offset="70%" stop-color="#FF007F" />
      <stop offset="100%" stop-color="#9D4EDD" />
    </linearGradient>

    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007F" />
      <stop offset="100%" stop-color="#B5179E" />
    </linearGradient>

    <!-- Filters -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#7209B7" flood-opacity="0.1" />
    </filter>
    <filter id="logoShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#B5179E" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Symmetrical bottom wavy footer -->
  <path d="M 0 540 
           Q 300 580 600 540 
           T 1200 560 
           L 1200 630 
           L 0 630 
           Z" 
        fill="url(#waveGrad)" />
        
  <path d="M 0 550 
           Q 300 590 600 550 
           T 1200 570 
           L 1200 630 
           L 0 630 
           Z" 
        fill="#FFFFFF" opacity="0.1" />

  <!-- Top Ribbon Badge -->
  <path d="M 400 0 L 800 0 L 770 45 C 765 52, 755 56, 745 56 L 455 56 C 445 56, 435 52, 430 45 Z" fill="url(#headerRibbon)" />
  <!-- White mini heart in ribbon -->
  <path d="M 600 24 C 600 24, 596 20, 596 17 C 596 15, 598 13, 600 13 C 601 13, 602 14, 602 15 C 602 14, 603 13, 604 13 C 606 13, 608 15, 608 17 C 608 20, 600 24, 600 24 Z" fill="#FFFFFF" />
  <text x="600" y="40" font-family="'Inter', sans-serif" font-weight="800" font-size="10.5" fill="#FFFFFF" letter-spacing="1.5px" text-anchor="middle">TU BIENESTAR EMOCIONAL COMIENZA AQUÍ</text>

  <!-- Left Side: Circular Logo Emblem -->
  <g transform="translate(180, 245)" filter="url(#logoShadow)">
    <circle cx="0" cy="0" r="145" fill="#FFFFFF" />
    <circle cx="0" cy="0" r="141" fill="url(#bgGrad)" />
    <circle cx="0" cy="0" r="137" fill="none" stroke="url(#borderGrad)" stroke-width="5" />
    
    <!-- Woman's Face Outline -->
    <path d="M 10 -60 
             C 20 -60, 38 -55, 41 -40 
             C 45 -30, 38 -20, 41 -12
             C 43 -8, 50 -5, 55 -5
             C 51 0, 45 1, 42 4
             C 38 10, 40 15, 45 17
             C 40 20, 33 21, 30 26
             C 24 33, 33 48, 23 58
             C 16 65, -1 61, -8 54
             Z" 
          fill="#FFF3F8" />
          
    <!-- Closed eye -->
    <path d="M 28 -25 C 31 -23, 35 -23, 38 -25" fill="none" stroke="#4B1A7A" stroke-width="2" stroke-linecap="round" />
    <!-- Lip -->
    <path d="M 43 2 C 45 2, 47 3, 45 4 C 43 5, 41 3, 43 2" fill="#FF007F" />

    <!-- Hair -->
    <path d="M 0 -80 
             C -45 -80, -65 -30, -65 20
             C -65 60, -42 78, -18 78
             C -32 60, -35 25, -28 -3
             C -21 -31, -4 -56, 13 -60
             Z" 
          fill="url(#hairGrad)" />
          
    <path d="M 6 -80
             C -32 -80, -49 -45, -49 0
             C -49 42, -25 70, 3 73
             C -10 63, -17 35, -13 7
             C -9 -21, 5 -49, 22 -56
             C 17 -64, 12 -72, 6 -80
             Z" 
          fill="#4B1A7A" opacity="0.85" />
          
    <circle cx="0" cy="0" r="82" fill="none" stroke="#FF007F" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.4" />
    
    <!-- Heart at base -->
    <path d="M 0 50 
             C 0 50, -21 28, -21 14
             C -21 5, -14 -2, -6 -2
             C -2 -2, 0 1, 0 3
             C 0 1, 2 -2, 6 -2
             C 14 -2, 21 5, 21 14
             C 21 28, 0 50, 0 50
             Z" 
          fill="url(#heartGrad)" />
  </g>

  <!-- Right Side: Brand Header & Typography -->
  <g transform="translate(420, 115)">
    <!-- M.A.P.A. Title -->
    <text x="0" y="70" class="main-title">M.A.P.A.</text>
    <text x="325" y="24" font-family="'Inter', sans-serif" font-weight="900" font-size="18" fill="#1E0A3C">TM</text>
    
    <!-- Divider Line with Heart -->
    <line x1="0" y1="95" x2="550" y2="95" stroke="#B5179E" stroke-width="1.5" opacity="0.3" />
    <path d="M 275 101 C 275 101, 270 97, 270 94 C 270 92, 272 90, 274 90 C 275 90, 275 91, 275 92 C 275 91, 275 90, 276 90 C 278 90, 280 92, 280 94 C 280 97, 275 101, 275 101 Z" fill="#FF007F" />

    <!-- Subtitle -->
    <text x="0" y="118" class="subtitle">MAPA DE ACTIVACIÓN Y PROTECCIÓN EMOCIONAL</text>

    <!-- Slogans -->
    <text x="275" y="162" class="slogan-banner" text-anchor="middle">
      Comprender es el primer paso para <tspan class="slogan-highlight">transformar.</tspan>
    </text>
  </g>

  <!-- 4 PILLARS/CARDS SECTION (Bento grid style) -->
  <g transform="translate(240, 335)" filter="url(#shadow)">
    <!-- Autoconocimiento -->
    <g transform="translate(0, 0)">
      <rect width="180" height="120" rx="20" fill="#FFFFFF" />
      <rect width="180" height="120" rx="20" fill="none" stroke="#FF007F" stroke-width="1" opacity="0.1" />
      <!-- Brain Icon circle -->
      <circle cx="90" cy="35" r="18" fill="#F3E8FF" />
      <!-- Brain path simplified -->
      <path d="M85 30 C81 30 79 33 81 36 C78 36 78 39 81 40 C79 41 81 44 85 43 C85 44 87 45 89 44 L89 29 C87 28 85 29 85 30 Z" fill="#9D4EDD" />
      <path d="M95 30 C99 30 101 33 99 36 C102 36 102 39 99 40 C101 41 99 44 95 43 C95 44 93 45 91 44 L91 29 C93 28 95 29 95 30 Z" fill="#7209B7" />
      <text x="90" y="72" class="card-title" text-anchor="middle">AUTOCONOCIMIENTO</text>
      <text x="90" y="88" class="card-desc" text-anchor="middle">Entiende lo que</text>
      <text x="90" y="101" class="card-desc" text-anchor="middle">sientes y por qué.</text>
    </g>

    <!-- Protección Emocional -->
    <g transform="translate(200, 0)">
      <rect width="180" height="120" rx="20" fill="#FFFFFF" />
      <rect width="180" height="120" rx="20" fill="none" stroke="#B5179E" stroke-width="1" opacity="0.1" />
      <!-- Shield Icon circle -->
      <circle cx="90" cy="35" r="18" fill="#E0F2FE" />
      <!-- Shield icon path -->
      <path d="M90 27 L97 30 L97 35 C97 40 93 44 90 45 C87 44 83 40 83 35 L83 30 Z" fill="#0284C7" />
      <text x="90" y="72" class="card-title" text-anchor="middle">PROTECCIÓN EMOCIONAL</text>
      <text x="90" y="88" class="card-desc" text-anchor="middle">Fortalece tu mente</text>
      <text x="90" y="101" class="card-desc" text-anchor="middle">y tu corazón.</text>
    </g>

    <!-- Bienestar Integral -->
    <g transform="translate(400, 0)">
      <rect width="180" height="120" rx="20" fill="#FFFFFF" />
      <rect width="180" height="120" rx="20" fill="none" stroke="#FF007F" stroke-width="1" opacity="0.1" />
      <!-- Heart Icon circle -->
      <circle cx="90" cy="35" r="18" fill="#FFE4E6" />
      <!-- Heart path -->
      <path d="M90 41 C90 41 80 33 80 29 C80 25 84 22 88 24 C90 25 90 26 90 26 C90 26 90 25 92 24 C96 22 100 25 100 29 C100 33 90 41 90 41 Z" fill="#FF007F" />
      <text x="90" y="72" class="card-title" text-anchor="middle">BIENESTAR INTEGRAL</text>
      <text x="90" y="88" class="card-desc" text-anchor="middle">Equilibra tus emociones</text>
      <text x="90" y="101" class="card-desc" text-anchor="middle">y mejora tu bienestar.</text>
    </g>

    <!-- Transformación Personal -->
    <g transform="translate(600, 0)">
      <rect width="180" height="120" rx="20" fill="#FFFFFF" />
      <rect width="180" height="120" rx="20" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.1" />
      <!-- Lotus Icon circle -->
      <circle cx="90" cy="35" r="18" fill="#ECFDF5" />
      <!-- Lotus flower path -->
      <path d="M90 25 C88 28 85 32 90 41 C95 32 92 28 90 25 Z" fill="#059669" />
      <path d="M90 29 C84 30 81 34 88 41 C89 36 88 32 90 29 Z" fill="#10B981" opacity="0.8" />
      <path d="M90 29 C96 30 99 34 92 41 C91 36 92 32 90 29 Z" fill="#10B981" opacity="0.8" />
      <text x="90" y="72" class="card-title" text-anchor="middle">TRANSFORMACIÓN PERSONAL</text>
      <text x="90" y="88" class="card-desc" text-anchor="middle">Pequeños cambios</text>
      <text x="90" y="101" class="card-desc" text-anchor="middle">para una gran vida.</text>
    </g>
  </g>

  <!-- Bottom Slogan and CTA Text on Wave -->
  <text x="600" y="580" class="bottom-guide" text-anchor="middle" fill="#FFFFFF">M.A.P.A.™ es tu guía para comprender, proteger y activar tu mejor versión.</text>
  <text x="600" y="608" class="bottom-cta" text-anchor="middle" fill="#FFFFFF">Tu viaje comienza ahora.</text>
</svg>
